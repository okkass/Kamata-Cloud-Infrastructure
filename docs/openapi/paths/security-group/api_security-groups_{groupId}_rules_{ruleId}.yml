      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: セキュリティグループの一意なID
    - name: ruleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: セキュリティグループルールの一意なID
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/security-group/SecurityRulePutRequest.yml
  responses:
    "200":
      description: 更新成功
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/security-group/SecurityRuleResponse.yml
    "400":
      description: リクエストエラー
    "401":
      description: 認証エラー
    "403":
      description: 権限エラー
    "404":
      description: セキュリティグループまたはルールが見つからない
  security:
    - BearerAuth: []
